spring.application.name=recipeflow

# Database (Render env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Render port
server.port=${PORT:8080}


# ==============================
# SendGrid Email Configuration
# ==============================

# SendGrid SMTP server
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587

# IMPORTANT:
# Username must literally be "apikey"
spring.mail.username=apikey

# Store your SendGrid API Key in Render environment variables
spring.mail.password=${SENDGRID_API_KEY}

# SMTP authentication
spring.mail.properties.mail.smtp.auth=true

# STARTTLS security
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.transport.protocol=smtp

# Connection timeouts
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000


# ==============================
# OTP Configuration
# ==============================

otp.expiration.minutes=15

# Must match your verified SendGrid sender email
otp.from.email=${SENDGRID_FROM_EMAIL}